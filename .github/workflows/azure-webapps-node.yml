# This workflow lints, tests, builds, and deploys a Next.js application to
# Azure App Service when a commit is pushed to the default branch.
#
# Setup instructions:
#  1. Create an Azure Web App and download its Publish Profile.
#  2. Add the profile contents as a repository secret named
#     AZURE_WEBAPP_PUBLISH_PROFILE.
#  3. Set AZURE_WEBAPP_NAME below to your application's name.
#
# Reference:
#  https://docs.microsoft.com/azure/app-service/deploy-github-actions

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-name       # set this to your application's name
  AZURE_WEBAPP_PACKAGE_PATH: '.'         # path to your web app project
  NODE_VERSION: '22.x'                   # node:sqlite requires Node ≥ 22

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Provide placeholder secrets so the build does not fail validation.
          AJEL_ADMIN_EMAIL: ci@ajel.local
          AJEL_ADMIN_PASSWORD: CI-only-password
          AJEL_SESSION_SECRET: ci-session-secret-not-used-in-production

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    name: Deploy to Azure
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure WebApp
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

