version: "3.9"

services:
  ajel:
    build:
      context: .
      dockerfile: Dockerfile
    image: ajel-live-crisis-app:latest
    container_name: ajel_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database across container restarts
      - ajel_data:/app/data
    environment:
      NODE_ENV: production
      # Override these with real values in a .env file or via docker secret:
      AJEL_ADMIN_EMAIL: ${AJEL_ADMIN_EMAIL:-admin@ajel.local}
      AJEL_ADMIN_PASSWORD: ${AJEL_ADMIN_PASSWORD:-ChangeThisNow!}
      AJEL_SESSION_SECRET: ${AJEL_SESSION_SECRET:-replace-with-a-long-random-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      RELIEFWEB_APPNAME: ${RELIEFWEB_APPNAME:-ajel-v2.local}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ajel_data:
    driver: local
